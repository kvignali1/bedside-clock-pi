<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedside Clock</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="clock">
        <div id="time">0:00:00</div>
        <div id="analytics">
            <div id="tempurature">75°F</div>
            <div id="precipitation">💧 0%</div>
            <div id="cloud-coverage">☁️ 0%</div>
        </div>
    </div>
    <div id="calendar">
        <div id="date">0/00/0000</div>
        <div id="event">No events scheduled</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
