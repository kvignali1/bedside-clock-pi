<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedside Clock</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="clock">
        <div id="day-night-display">
            <div id="sky"></div>
            <div id="celestial-body"></div>
        </div>
        <div id="clock-main">
            <div id="segment-display">
                <div id="digit-1" class="segment-digit"></div>
                <div id="digit-2" class="segment-digit"></div>
                <div class="colon" aria-hidden="true"></div>
                <div id="digit-3" class="segment-digit"></div>
                <div id="digit-4" class="segment-digit"></div>
                <div class="colon" aria-hidden="true"></div>
                <div id="digit-5" class="segment-digit"></div>
                <div id="digit-6" class="segment-digit"></div>
            </div>
            <div id="date">0/00/0000</div>
        </div>
        <div id="analytics">
            <div class="metric">
                <img class="metric-icon" src="assets/icons/temperature.png" alt="Temperature">
                <div id="tempurature">0&deg;F</div>
            </div>
            <div class="metric">
                <img class="metric-icon" src="assets/icons/precipitation.png" alt="Precipitation">
                <div id="precipitation">0%</div>
            </div>
            <div class="metric">
                <img class="metric-icon" src="assets/icons/cloud-coverage.png" alt="Cloud coverage">
                <div id="cloud-coverage">0%</div>
            </div>
            <div class="metric">
                <img class="metric-icon" src="assets/icons/humidity.png" alt="Humidity">
                <div id="humidity">0%</div>
            </div>
            <div id="season"></div>
        </div>
    </div>
    <button id="update-button" type="button">Update</button>
    <div id="update-status" aria-live="polite"></div>
    <div id="update-banner" aria-live="polite" hidden></div>
    <script src="app.js"></script>
</body>
</html>
